spring.application.name=hireus-api
spring.config.import=optional:file:../.env[.properties]

# Database Configuration (Takes values from environment/dotenv)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hireus}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis Cache / Rate Limiting
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}

# JWT configuration
jwt.secret-key=${JWT_SECRET_KEY:bXktc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctYW5kLXNlY3VyZQ==}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Server port
server.port=${SERVER_PORT:8080}

# Swagger-UI custom path
springdoc.swagger-ui.path=/api-docs

# Cache
spring.cache.type=redis
