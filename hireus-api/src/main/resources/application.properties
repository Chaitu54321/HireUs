spring.application.name=hireus-api
spring.config.import=optional:file:../.env[.properties]

# Database Configuration (Takes values from environment/dotenv)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hireus}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Cache (optional — set CACHE_TYPE=redis and provide Redis credentials to enable)
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}

# Cache type: 'simple' (in-memory, no Redis needed) or 'redis' (requires Redis)
spring.cache.type=${CACHE_TYPE:simple}

# Disable Redis auto-config when not using Redis cache
spring.autoconfigure.exclude=${REDIS_EXCLUDE:org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration}

# JWT configuration
jwt.secret-key=${JWT_SECRET_KEY:bXktc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctYW5kLXNlY3VyZQ==}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Server port
server.port=${SERVER_PORT:8080}

# CORS — comma-separated list of allowed origins (set to your Vercel URL in production)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Swagger-UI custom path
springdoc.swagger-ui.path=/api-docs
