version: '3.8'

services:
  # Optional: Local Postgres if you don't use NeonDB
  postgres:
    image: postgres:15-alpine
    container_name: hireus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: hireus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  # Redis for Rate Limiting and Caching
  redis:
    image: redis:7-alpine
    container_name: hireus-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres-data:
